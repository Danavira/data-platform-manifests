apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: postgres
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Covers both the legacy StatefulSet pod (app: postgres) and CNPG-managed pods
# (cnpg.io/cluster: postgres) so clients stay connected throughout the migration.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-ingress
  namespace: postgres
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: airflow
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vikunja
      ports:
        - protocol: TCP
          port: 5432
---
# Required during migration: CNPG bootstrap pod connects to the existing StatefulSet
# on 5432 to run pg_dump. Also covers future primary-to-replica replication traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: postgres
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# CNPG instance-manager needs the k8s API, the import job reaches the source DB,
# and replication traffic between instances is unpredictable. Egress is unrestricted;
# the ingress rules above are where the real security boundary sits.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-egress
  namespace: postgres
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - {}
