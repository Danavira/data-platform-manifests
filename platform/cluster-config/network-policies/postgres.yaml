apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: postgres
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Covers both the legacy StatefulSet pod (app: postgres) and CNPG-managed pods
# (cnpg.io/cluster: postgres) so clients stay connected throughout the migration.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-ingress
  namespace: postgres
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: airflow
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vikunja
      ports:
        - protocol: TCP
          port: 5432
---
# Allows CNPG primary→replica replication and intra-cluster health checks.
# Egress-only direction: no Egress policyType is set on any policy in this
# namespace so egress remains unrestricted by default.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace-ingress
  namespace: postgres
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
