---
# Fail if any container image uses ':latest' or has no tag at all.
# Uses pattern negation (!*:latest) which is CLI-compatible and avoids the
# foreach+JMESPath concatenation that causes "skipped" in kyverno apply.
# Note: untagged images like 'nginx' (no colon) are not caught by this pattern;
# they are caught by trivy's config scan (KSV-0013).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: deny-latest-tag
      match:
        any:
        - resources:
            kinds: [Pod]
      exclude:
        any:
        - resources:
            namespaces: [kube-system, kube-public, kube-node-lease]
      validate:
        message: "Image must use an explicit version tag, not ':latest'."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
            =(initContainers):
              - image: "!*:latest"
            =(ephemeralContainers):
              - image: "!*:latest"
---
# Allow images only from known registries.
# Uses a deny rule with a JMESPath filter that selects images containing '/'
# (i.e. those with an explicit registry prefix). Docker Hub short-form images
# like 'postgres:17' have no '/' and are implicitly allowed as docker.io/library.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-unknown-registry
      match:
        any:
        - resources:
            kinds: [Pod]
      exclude:
        any:
        - resources:
            namespaces: [kube-system, kube-public, kube-node-lease]
      validate:
        message: "Image uses a disallowed registry. Allowed: ghcr.io, docker.io, registry.k8s.io, quay.io, gcr.io."
        deny:
          conditions:
            any:
            # Evaluate only images that have a registry prefix (contain '/').
            # AnyNotIn: deny if any image with a '/' is not in the allowlist.
            - key: "{{ request.object.spec.containers[?contains(image, '/')].image }}"
              operator: AnyNotIn
              value:
                - "ghcr.io/*"
                - "docker.io/*"
                - "index.docker.io/*"
                - "registry.k8s.io/*"
                - "quay.io/*"
                - "gcr.io/*"
            - key: "{{ request.object.spec.initContainers[?contains(image, '/')].image }}"
              operator: AnyNotIn
              value:
                - "ghcr.io/*"
                - "docker.io/*"
                - "index.docker.io/*"
                - "registry.k8s.io/*"
                - "quay.io/*"
                - "gcr.io/*"
---
# Audit: production workloads should pin images by digest (@sha256:...).
# Scoped to pods labeled platform.danavira.com/env: production.
# Switch to Enforce once all prod images are digest-pinned.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-image-digest
  annotations:
    policies.kyverno.io/title: Require Image Digest for Production
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-digest
      match:
        any:
        - resources:
            kinds: [Pod]
            selector:
              matchLabels:
                platform.danavira.com/env: production
      validate:
        message: "Production images must be pinned by digest (@sha256:...)."
        deny:
          conditions:
            any:
            - key: "{{ request.object.spec.containers[].image }}"
              operator: AnyNotIn
              value:
                - "*@sha256:*"
