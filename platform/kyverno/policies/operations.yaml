---
# Require CPU and memory requests on every container.
# Uses the standard containers list pattern — applies to each item in the list.
# foreach.pattern is not supported; spec.containers[-] is the canonical form.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests
  annotations:
    policies.kyverno.io/title: Require Resource Requests
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-requests
      match:
        any:
        - resources:
            kinds: [Pod]
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - kube-public
              - kube-node-lease
              - monitoring
              - cert-manager
              - argocd
      validate:
        message: "All containers must set CPU and memory requests."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
---
# Require memory limits on every container.
# CPU limits are intentionally not enforced (CPU throttling is preferable to
# OOM kills; set a cluster default in LimitRange if needed).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-memory-limits
  annotations:
    policies.kyverno.io/title: Require Memory Limits
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-memory-limit
      match:
        any:
        - resources:
            kinds: [Pod]
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - kube-public
              - kube-node-lease
              - monitoring
              - cert-manager
              - argocd
      validate:
        message: "All containers must set a memory limit."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
---
# Audit: require the app.kubernetes.io/name label on workload pods.
# Excluded namespaces are managed by third-party Helm charts whose templates
# we cannot modify. Our own workloads (hello-cicd, postgres) must comply.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-app-labels
  annotations:
    policies.kyverno.io/title: Require app.kubernetes.io Labels
    policies.kyverno.io/severity: low
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-name-label
      match:
        any:
        - resources:
            kinds: [Pod]
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - kube-public
              - kube-node-lease
              - monitoring
              - cert-manager
              - argocd
              - vikunja
      validate:
        message: "Pod is missing the 'app.kubernetes.io/name' label."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
---
# Audit: production workloads must run at least 2 replicas.
# Apply the label platform.danavira.com/env: production to Deployments and
# StatefulSets that are production-grade to activate this check.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-multiple-replicas
  annotations:
    policies.kyverno.io/title: Require Multiple Replicas for Production
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-replicas-gte-2
      match:
        any:
        - resources:
            kinds: [Deployment, StatefulSet]
            selector:
              matchLabels:
                platform.danavira.com/env: production
      validate:
        message: "Production Deployments and StatefulSets must have at least 2 replicas."
        pattern:
          spec:
            replicas: ">=2"
