# danavira-vps-1: control plane — no taints, runs cluster-wide tooling
# (ArgoCD, Prometheus, Grafana, Radar, ingress, cert-manager)

# danavira-worker-1: stateful node — Postgres, ClickHouse
apiVersion: v1
kind: Node
metadata:
  name: danavira-worker-1
  labels:
    role: stateful
spec:
  taints:
    - key: role
      value: stateful
      effect: NoSchedule
---
# danavira-worker-2: compute node — Spark, Airflow, Kafka, Debezium
apiVersion: v1
kind: Node
metadata:
  name: danavira-worker-2
  labels:
    role: compute
spec:
  taints:
    - key: role
      value: compute
      effect: NoSchedule
