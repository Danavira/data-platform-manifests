name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── Render ──────────────────────────────────────────────────────────────────
  # Kustomize-build all kustomized apps; helm-template all Helm apps.
  # All subsequent jobs consume the "rendered" artifact so we only render once.
  render:
    name: Render manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.6.0
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar xz
          sudo install -m 755 kustomize /usr/local/bin/

      - name: Install helm
        run: curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Auth to GHCR (for private OCI charts)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Kustomize build
        run: |
          mkdir -p rendered
          for dir in apps/postgres apps/hello-cicd apps/clickhouse apps/marketing-automation platform/cluster-config; do
            name=$(echo "$dir" | tr '/' '-')
            kustomize build "$dir" > "rendered/${name}.yaml"
          done

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add jetstack            https://charts.jetstack.io
          helm repo add metrics-server      https://kubernetes-sigs.github.io/metrics-server/
          helm repo add argo                https://argoproj.github.io/argo-helm
          helm repo update

      - name: Helm template
        run: |
          # -n sets .Release.Namespace so all resources get the right namespace in metadata.
          # This is required for kubesec to correctly skip third-party system namespaces.
          helm template airflow oci://ghcr.io/danavira/helm-charts/airflow \
            --version 1.16.0 -n airflow -f apps/airflow/values.yaml \
            > rendered/airflow.yaml

          helm template monitoring prometheus-community/kube-prometheus-stack \
            --version 82.18.0 -n monitoring -f apps/monitoring/values.yaml \
            > rendered/monitoring.yaml

          helm template vikunja oci://ghcr.io/go-vikunja/helm-chart/vikunja \
            --version 1.0.0 -n vikunja -f apps/vikunja/values.yaml \
            > rendered/vikunja.yaml

          helm template cert-manager jetstack/cert-manager \
            --version v1.20.0 -n cert-manager --set crds.enabled=true \
            > rendered/cert-manager.yaml

          helm template metrics-server metrics-server/metrics-server \
            --version 3.13.0 -n kube-system --set 'args={--kubelet-insecure-tls}' \
            > rendered/metrics-server.yaml

          helm template argocd-image-updater argo/argocd-image-updater \
            -n argocd \
            --set config.registries[0].name="GitHub Container Registry" \
            --set config.registries[0].prefix=ghcr.io \
            --set config.registries[0].api_url=https://ghcr.io \
            --set config.registries[0].defaultns=danavira \
            > rendered/argocd-image-updater.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: rendered
          path: rendered/
          retention-days: 1

  # ── Schema validation ────────────────────────────────────────────────────────
  kubeconform:
    name: Schema validation (kubeconform)
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: rendered
          path: rendered/

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz
          sudo install -m 755 kubeconform /usr/local/bin/

      - name: Validate rendered schemas
        run: |
          # -strict is intentionally omitted: the master-standalone-strict schemas have
          # additionalProperties:false that rejects some kustomize-generated fields as
          # false positives. Type errors and missing required fields are still caught.
          kubeconform \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            rendered/

  # ── kubesec ─────────────────────────────────────────────────────────────────
  # Static risk-scoring for workload resources. Fails if any resource scores < 0
  # (meaning a critical misconfiguration was found, e.g. privileged: true,
  # missing resource limits, running as root).
  kubesec:
    name: kubesec security scan
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: rendered
          path: rendered/

      - name: Install kubesec
        run: |
          KUBESEC_VERSION=v2.14.0
          curl -sL "https://github.com/controlplaneio/kubesec/releases/download/${KUBESEC_VERSION}/kubesec_linux_amd64.tar.gz" \
            | tar xz
          sudo install -m 755 kubesec /usr/local/bin/

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Scan workload manifests
        run: |
          python3 - <<'EOF'
          import json, subprocess, sys
          from pathlib import Path
          import yaml

          WORKLOAD_KINDS = {"Pod", "Deployment", "StatefulSet", "DaemonSet", "Job", "CronJob"}

          # These namespaces contain Helm-managed system charts that are intentionally
          # granted elevated permissions (e.g. node-exporter needs hostNetwork + hostPID,
          # kube-system components run with special privileges). Trivy scans them instead.
          SKIP_NAMESPACES = frozenset({"monitoring", "kube-system", "cert-manager"})

          failed = False

          for path in sorted(Path("rendered").glob("*.yaml")):
              with open(path) as f:
                  docs = list(yaml.safe_load_all(f))

              for doc in docs:
                  if not isinstance(doc, dict) or doc.get("kind") not in WORKLOAD_KINDS:
                      continue
                  ns = doc.get("metadata", {}).get("namespace", "default")
                  if ns in SKIP_NAMESPACES:
                      name = doc.get("metadata", {}).get("name", "?")
                      print(f"SKIP {doc['kind']}/{name} (namespace {ns} is excluded)")
                      continue

                  doc_yaml = yaml.dump(doc)
                  result = subprocess.run(
                      ["kubesec", "scan", "/dev/stdin"],
                      input=doc_yaml.encode(),
                      capture_output=True,
                  )
                  try:
                      data = json.loads(result.stdout)
                  except json.JSONDecodeError:
                      print(f"::warning::Could not parse kubesec output for {path}")
                      continue

                  for item in data:
                      score = item.get("score", 0)
                      obj   = item.get("object", str(path))
                      if score < 0:
                          print(f"::error file={path}::kubesec score {score} for {obj}")
                          for c in item.get("scoring", {}).get("critical", []):
                              print(f"  [{c['id']}] {c['reason']}")
                          failed = True
                      else:
                          print(f"OK  {obj}: score={score}")

          sys.exit(1 if failed else 0)
          EOF

  # ── Trivy ────────────────────────────────────────────────────────────────────
  # IaC / config misconfiguration scan on source files. Covers:
  # privileged, hostNetwork, missing limits, disallowed capabilities, etc.
  # Runs independently of the render step (source files are sufficient).
  # Uses the install script rather than the GitHub Action to avoid action-tag
  # drift (the action's tag versioning is independent of trivy itself).
  trivy:
    name: Trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan configs
        run: trivy config . --exit-code 1 --severity HIGH,CRITICAL --skip-dirs docs,.git

  # ── Kyverno ──────────────────────────────────────────────────────────────────
  # Runs platform/kyverno/policies/ against all rendered resources.
  # Enforce-mode policies cause a non-zero exit; Audit-mode violations are shown
  # as warnings. Apply these same policies to the cluster for admission control.
  kyverno:
    name: Kyverno policy check
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: rendered
          path: rendered/

      - name: Install kyverno CLI
        run: |
          # Kyverno's release asset naming changes across minor versions, so we use
          # the GitHub API to find the correct Linux amd64 tar rather than hardcoding.
          KYVERNO_VERSION=v1.13.5
          ASSET_URL=$(curl -fsSL \
            "https://api.github.com/repos/kyverno/kyverno/releases/tags/${KYVERNO_VERSION}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          hits = [
              a['browser_download_url'] for a in data.get('assets', [])
              if 'linux' in a['name'].lower()
              and ('amd64' in a['name'].lower() or 'x86_64' in a['name'].lower())
              and '.tar.gz' in a['name']
              and 'checksums' not in a['name'].lower()
              and 'sbom' not in a['name'].lower()
          ]
          print(hits[0] if hits else '')
          ")
          if [ -z "$ASSET_URL" ]; then
            echo '::error::No Linux amd64 .tar.gz found for Kyverno ${KYVERNO_VERSION}'
            exit 1
          fi
          curl -fsSL "$ASSET_URL" -o kyverno.tar.gz
          tar xzf kyverno.tar.gz
          BIN=$(find . -maxdepth 2 -type f \( -name 'kyverno' -o -name 'kyverno-cli' \) -perm -u+x | head -1)
          if [ -z "$BIN" ]; then
            echo '::error::kyverno binary not found in archive'; ls -la; exit 1
          fi
          sudo install -m 755 "$BIN" /usr/local/bin/kyverno
          kyverno version

      - name: Apply policies against rendered manifests
        run: |
          # Only scan kustomize-built outputs (apps-*.yaml, platform-*.yaml).
          # Helm chart outputs are validated by trivy; their rendered metadata
          # often omits explicit namespace fields, so Kyverno CLI would treat
          # every resource as namespace "default" and namespace-based exclusions
          # would silently fail. Cluster-side admission handles Helm charts
          # correctly because the webhook sees the real namespace.
          RESOURCE_ARGS=""
          for f in rendered/apps-*.yaml rendered/platform-*.yaml; do
            [ -f "$f" ] && RESOURCE_ARGS="$RESOURCE_ARGS --resource $f"
          done
          if [ -z "$RESOURCE_ARGS" ]; then
            echo "No kustomize-built files found to scan."
            exit 1
          fi
          kyverno apply platform/kyverno/policies/ \
            $RESOURCE_ARGS \
            --detailed-results

  # ── Restricted-resource gate ─────────────────────────────────────────────────
  # On PRs only. Fails if the diff introduces ClusterRole(Binding), Namespace,
  # CRD, LoadBalancer, or Ingress changes without the 'platform-approved' label.
  detect-restricted:
    name: Restricted resource gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for restricted resource changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESTRICTED_KINDS="ClusterRole ClusterRoleBinding Namespace CustomResourceDefinition"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BASE="${{ github.base_ref }}"

          changed=$(git diff --name-only "origin/${BASE}...HEAD" | grep '\.yaml$' || true)
          [ -z "$changed" ] && { echo "No YAML files changed."; exit 0; }

          found=false
          for f in $changed; do
            [ -f "$f" ] || continue
            for kind in $RESTRICTED_KINDS; do
              if grep -qE "^kind: ${kind}$" "$f"; then
                echo "::warning file=${f}::Restricted kind: ${kind}"
                found=true
              fi
            done
            if grep -qE "^  type: LoadBalancer$|^kind: Ingress$" "$f"; then
              echo "::warning file=${f}::LoadBalancer or Ingress change"
              found=true
            fi
          done

          if [ "$found" = "true" ]; then
            labels=$(gh pr view "${PR_NUMBER}" --json labels \
              --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
            if ! echo "$labels" | grep -q "platform-approved"; then
              echo "::error::Restricted resource changes require the 'platform-approved' label."
              echo "Have the platform team review and apply that label to proceed."
              exit 1
            fi
            echo "platform-approved label present — gate passed."
          fi
