apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-cicd
  namespace: hello-cicd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-cicd
  template:
    metadata:
      labels:
        app: hello-cicd
    spec:
      containers:
        - name: hello-cicd
          image: ghcr.io/danavira/hello-cicd:6e61511
          imagePullPolicy: Always
          resource:
            requests:
              cpu: "0.1"
              memory: 100Mi
            limits:
              cpu: "0.11"
              memory: 110Mi
      imagePullSecrets:
        - name: ghcr-pull-secret
