# App-of-apps: watches data-platform-manifests/apps/ and creates child Applications
# from any Application manifests found there.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-platform-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Danavira/data-platform-manifests.git
    targetRevision: HEAD
    path: apps
    directory:
      recurse: true
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
