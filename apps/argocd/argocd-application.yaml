# Self-managed ArgoCD — applies the ArgoCD Helm chart with our values override.
# Bootstrap: apply this manually once with kubectl apply -f.
# After that, ArgoCD manages its own upgrades.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: "*"
    helm:
      valueFiles:
        - $manifests/apps/argocd/argocd-values.yaml
      parameters: []
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: "*"
      helm:
        valueFiles:
          - $manifests/apps/argocd/argocd-values.yaml
    - repoURL: https://github.com/Danavira/data-platform-manifests.git
      targetRevision: HEAD
      ref: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
