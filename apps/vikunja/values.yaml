## This chart relies on the common library chart from bjw-s
## You can find it and the values you can provide and modify, at https://github.com/bjw-s/helm-charts/tree/a081de53024d8328d1ae9ff7e4f6bc500b0f3a29/charts/library/common
## Here's the link to the values.yaml file: https://github.com/bjw-s/helm-charts/blob/a081de53024d8328d1ae9ff7e4f6bc500b0f3a29/charts/library/common/values.yaml
## Refer there for more detail about the supported values.
## Any values that you find in the above `values.yaml` can be provided to this chart and are then rendered.

# You can find the default values that this `values.yaml` overrides, in the comment at the top of this file.
vikunja:
  image:
    repository: vikunja/vikunja
    #tag: "latest"
    #pullPolicy: Always
  persistence:
    # This is where your Vikunja data lives,
    # provide an existing PVC or let one be autocreated
    data:
      enabled: true
      # existingClaim: # your-claim
      accessMode: ReadWriteOnce
      size: 2Gi
      mountPath: /app/vikunja/files
      # storageClass: storage-class
    # Persistence for SQLite database
    database:
      enabled: true
      # existingClaim: # your-claim
      accessMode: ReadWriteOnce
      size: 2Gi
      mountPath: /db
      # storageClass: storage-class
  ingress:
    main:
      enabled: true
      annotations:
        # proxy-body-size is set to 0 to remove the body limit on file uploads
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      hosts:
        - host: vikunja.danavira.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: vikunja-tls
          hosts:
            - vikunja.danavira.com
  configMaps:
    # The configuration for Vikunja's api
    # https://vikunja.io/docs/config-options/
    config:
      enabled: true
      data:
        config.yml: |
          # You can add Vikunja configuration items from https://vikunja.io/docs/config-options/ to this file
          service:
            # Required after Vikunja 1.0.0
            publicurl: "https://vikunja.danavira.com"
            enableregistration: true
  env:
    VIKUNJA_TYPESENSE_URL: ""
    VIKUNJA_DATABASE_TYPE: "postgres"
    VIKUNJA_DATABASE_HOST: "postgres-rw.postgres.svc.cluster.local"
    VIKUNJA_DATABASE_PORT: "5432"
    VIKUNJA_DATABASE_DATABASE: "vikunja"
    VIKUNJA_DATABASE_USER: "postgres"
    VIKUNJA_DATABASE_SSLMODE: "disable"
    VIKUNJA_DATABASE_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: postgres-password

postgresql:
  enabled: false
  global:
    postgresql:
      auth:
        database: vikunja
        username: vikunja
        password: vikunja
  auth:
    database: vikunja
    username: vikunja
    password: vikunja

additionalObjects: []

