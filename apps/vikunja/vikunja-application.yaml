apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vikunja
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: vikunja
  sources:
    - repoURL: oci://ghcr.io/go-vikunja/helm-chart/vikunja
      chart: vikunja
      targetRevision: "1.0.0"
      helm:
        valueFiles:
          - $values/apps/vikunja/vikunja-values.yaml
    - repoURL: https://github.com/Danavira/data-platform-manifests.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true  
    syncOptions:
      - CreateNamespace=true