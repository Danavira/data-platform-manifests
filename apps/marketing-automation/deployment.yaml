apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-automation
  namespace: marketing-automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketing-automation
  template:
    metadata:
      labels:
        app: marketing-automation
        app.kubernetes.io/name: marketing-automation
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: marketing-automation
          image: ghcr.io/danavira/marketing-automation:868bb297e8e61f7cf4d22d4a1d71ecbc917c9b57
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: marketing-automation-secrets
                  key: auth-user
            - name: AUTH_PASS
              valueFrom:
                secretKeyRef:
                  name: marketing-automation-secrets
                  key: auth-pass
          resources:
            requests:
              cpu: "0.1"
              memory: 100Mi
            limits:
              cpu: "0.11"
              memory: 110Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      imagePullSecrets:
        - name: ghcr-pull-secret
