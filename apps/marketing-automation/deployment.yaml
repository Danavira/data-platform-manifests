apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-automation
  namespace: marketing-automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketing-automation
  template:
    metadata:
      labels:
        app: marketing-automation
        app.kubernetes.io/name: marketing-automation
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: marketing-automation
          image: ghcr.io/danavira/marketing-automation:66e33638a13d9a07403443591ec3db69c62ffac4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: marketing-automation-secrets
                  key: auth-user
            - name: AUTH_PASS
              valueFrom:
                secretKeyRef:
                  name: marketing-automation-secrets
                  key: auth-pass
          resources:
            requests:
              cpu: "0.1"
              memory: 100Mi
            limits:
              cpu: "0.11"
              memory: 110Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      imagePullSecrets:
        - name: ghcr-pull-secret
