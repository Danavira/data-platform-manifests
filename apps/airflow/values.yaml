executor: KubernetesExecutor

# Applied to all main component pod templates (scheduler, webserver, triggerer, etc.)
labels:
  app.kubernetes.io/name: airflow

createUserJob:
  useHelmHooks: false
  applyCustomEnv: false
  jobAnnotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    app.kubernetes.io/name: airflow
  env:
    - name: AIRFLOW_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: airflow-admin-credentials
          key: password
  args:
    - "bash"
    - "-c"
    - |-
      exec airflow users create \
        -r "Admin" \
        -u "admin" \
        -e "admin@danavira.com" \
        -f "Admin" \
        -l "User" \
        -p "$AIRFLOW_ADMIN_PASSWORD"
migrateDatabaseJob:
  useHelmHooks: false
  applyCustomEnv: false
  jobAnnotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    app.kubernetes.io/name: airflow

dags:
  gitSync:
    enabled: true
    repo: https://github.com/Danavira/batch-elt-pipeline.git
    branch: main
    subPath: dags
    period: 60s
    credentialsSecret: airflow-git-credentials

scheduler:
  nodeSelector:
    role: compute
  tolerations:
    - key: role
      value: compute
      effect: NoSchedule

webserver:
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    email: admin@danavira.com
    firstName: Admin
    lastName: User
    password: unused  # set via AIRFLOW_ADMIN_PASSWORD env in createUserJob.args
  nodeSelector:
    role: compute
  tolerations:
    - key: role
      value: compute
      effect: NoSchedule

ingress:
  web:
    enabled: true
    ingressClassName: nginx
    hosts:
      - name: airflow.danavira.com
        tls:
          enabled: true
          secretName: airflow-tls
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare

postgresql:
  enabled: false

data:
  metadataSecretName: airflow-metadata

webserverSecretKeySecretName: airflow-webserver-secret-key

config:
  core:
    default_timezone: Asia/Jakarta
  webserver:
    default_ui_timezone: Asia/Jakarta
    warn_deployment_exposure: 'False'
