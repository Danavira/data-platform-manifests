apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: airflow
  sources:
    - repoURL: oci://ghcr.io/danavira/helm-charts/airflow
      chart: airflow
      targetRevision: "1.16.0"
      helm:
        valueFiles:
          - $values/apps/airflow/values.yaml
    - repoURL: https://github.com/Danavira/data-platform-manifests.git
      targetRevision: HEAD
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
