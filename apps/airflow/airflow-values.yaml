executor: KubernetesExecutor

createUserJob:
  useHelmHooks: false
  applyCustomEnv: false
migrateDatabaseJob:
  useHelmHooks: false
  applyCustomEnv: false

dags:
  gitSync:
    enabled: true
    repo: https://github.com/Danavira/batch-etl.git
    branch: main
    subPath: dags
    period: 60s

scheduler:
  nodeSelector:
    role: compute

webserver:
  ingress:
    enabled: false
  nodeSelector:
    role: compute

postgresql:
  enabled: true
