executor: KubernetesExecutor

createUserJob:
  useHelmHooks: false
  applyCustomEnv: false
  extraAnnotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
migrateDatabaseJob:
  useHelmHooks: false
  applyCustomEnv: false
  extraAnnotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded

dags:
  gitSync:
    enabled: true
    repo: https://github.com/Danavira/batch-etl.git
    branch: main
    subPath: dags
    period: 60s

scheduler:
  nodeSelector:
    role: compute
  tolerations:
    - key: role
      value: compute
      effect: NoSchedule

webserver:
  nodeSelector:
    role: compute
  tolerations:
    - key: role
      value: compute
      effect: NoSchedule

