apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: airflow
  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: "1.15.0"
      helm:
        valueFiles:
          - $values/apps/airflow/airflow-values.yaml
    - repoURL: https://github.com/Danavira/data-platform-manifests.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
