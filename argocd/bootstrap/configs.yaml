# Watches data-platform-configs/ and applies ExternalSecrets, ClusterSecretStore,
# ClusterIssuer, and other config resources directly to the cluster.
# Bootstrap: apply manually once with kubectl apply -f after ArgoCD is running.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-platform-configs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Danavira/data-platform-configs.git
    targetRevision: HEAD
    path: .
    directory:
      recurse: true
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
